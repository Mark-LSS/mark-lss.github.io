<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diving Toolkit | OTU ↔ ESOT Converter</title>

<link rel="stylesheet" href="../assets/css/site.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background:#f0f2f5;
}

.page { max-width:560px; margin:auto; }

.local-header {
    background:#014782;
    padding:18px;
    display:flex;
}

.header-text h1 { color:#FFEE02; font-size:15px; }
.header-text p { color:white; font-size:11px; }

.card {
    background:white;
    padding:20px;
    border:1px solid #d8dde4;
}

.grid-2 {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.field input { width:100%; padding:8px; }

.result-inline {
    display:none;
    background:#014782;
    padding:10px;
    margin-top:10px;
}

.result-inline.visible { display:flex; justify-content:space-between; }

.res-value {
    color:#FFEE02;
    font-weight:700;
}

.btn-row { display:flex; gap:10px; margin-top:10px; }

.btn-calc { flex:1; background:#014782; color:#FFEE02; padding:10px; border:none; }
.btn-reset { background:#e8ebef; padding:10px; border:none; }

.local-footer {
    background:#e8ebef;
    padding:10px;
    border:1px solid #d8dde4;
    border-top:none;
}

@media(max-width:700px){
.grid-2{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header class="site-header">
<div class="container header-inner">
<div class="brand">
<div class="brand-mark">∩</div>
<div>
<h1>Diving Toolkit</h1>
<p class="tagline">Operational calculators and support tools</p>
</div>
</div>

<nav class="top-nav">
<a href="../index.html">Home</a>
<a href="../index.html#calculators" class="active">Calculators</a>
<a href="../index.html#emergency">Emergency</a>
<a href="../documents/index.html">Documents</a>
</nav>
</div>

<main class="tool-page">
<div class="container tool-shell">

<div class="tool-topbar">
<div class="tool-breadcrumbs">
<a href="../index.html">Home</a> /
<a href="../index.html#calculators">Calculators</a> /
<span>OTU ↔ ESOT Converter</span>
</div>
<a class="back-home" href="../index.html">← Back</a>
</div>

<div class="page">

<header class="local-header">
<div class="header-text">
<h1>OTU ↔ ESOT CONVERTER</h1>
<p>Convert between exposure units</p>
</div>
</header>

<!-- PANEL A -->
<div class="card">

<div class="grid-2">
<input id="a_uptd">
<input id="a_po2">
</div>

<div class="result-inline" id="a_result">
<span>ESOT</span>
<span class="res-value" id="a_esot">—</span>
</div>

<div class="btn-row">
<button class="btn-calc" onclick="conv.runA()">CONVERT</button>
<button class="btn-reset" onclick="conv.resetA()">RESET</button>
</div>

</div>

<!-- PANEL B -->
<div class="card">

<div class="grid-2">
<input id="b_esot">
<input id="b_po2">
</div>

<div class="result-inline" id="b_result">
<span>OTU</span>
<span class="res-value" id="b_uptd">—</span>
</div>

<div class="btn-row">
<button class="btn-calc" onclick="conv.runB()">CONVERT</button>
<button class="btn-reset" onclick="conv.resetB()">RESET</button>
</div>

</div>

<footer class="local-footer">
<span>N-Sea Calculator</span>
</footer>

</div>
</div>
</main>

<div class="container footer-inner">
