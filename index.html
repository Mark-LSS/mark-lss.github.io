<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diving Toolkit — N-Sea Operations Library</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --nb:#014782;--nb-h:#013a6b;--nb-l:#0a5a9c;
  --nb-tint:#e6f0f9;--nb-tint2:#c8ddf0;--ny:#FFEE02;
  --bg:#ffffff;--bg2:#f4f5f7;--bg3:#eceef2;
  --txt:#1b1d20;--txt2:#56606e;--txt3:#8b96a3;
  --bdr:#d6dae1;--bdr2:#b8bec8;
  --r:6px;--r-lg:10px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1b1e23;--bg2:#22262d;--bg3:#292e38;
    --txt:#e4e7ec;--txt2:#98a2b0;--txt3:#5c6575;
    --bdr:#30363f;--bdr2:#444d5a;
    --nb-tint:#0d2640;--nb-tint2:#133350;
  }
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:13px;color:var(--txt);background:var(--bg2)}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TITLE BAR */
#title-bar{background:var(--nb);height:36px;display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;user-select:none}
.tb-wins{display:flex;gap:7px}.tb-wins span{display:block;width:12px;height:12px;border-radius:50%}
.tw-c{background:#ff5f57}.tw-m{background:#febc2e}.tw-x{background:#28c840}
.tb-logo{background:var(--ny);color:var(--nb);font-weight:700;font-size:11px;padding:3px 8px;border-radius:3px;letter-spacing:.05em;flex-shrink:0}
.tb-title{color:rgba(255,255,255,.85);font-size:13px;font-weight:400;flex:1}
.tb-url{color:rgba(255,255,255,.35);font-size:11px}

/* MENU BAR */
#menu-bar{background:var(--nb-h);height:27px;display:flex;align-items:stretch;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,.2)}
.mb{padding:0 11px;color:rgba(255,255,255,.75);font-size:12px;cursor:pointer;display:flex;align-items:center;border:none;background:transparent;transition:background .1s,color .1s}
.mb:hover{background:rgba(255,255,255,.12);color:#fff}

/* TOOLBAR */
#toolbar{background:var(--bg2);height:38px;border-bottom:1px solid var(--bdr);padding:0 8px;display:flex;align-items:center;gap:2px;flex-shrink:0}
.tb{height:26px;padding:0 9px;border:1px solid transparent;border-radius:var(--r);background:transparent;color:var(--txt2);font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap;text-decoration:none}
.tb:hover{background:var(--bg);border-color:var(--bdr);color:var(--txt)}
.tb.primary{background:var(--nb);color:#fff;border-color:var(--nb)}
.tb.primary:hover{background:var(--nb-l)}
.tb-sep{width:1px;height:20px;background:var(--bdr);margin:0 3px;flex-shrink:0}
#srch-wrap{margin-left:auto;display:flex;align-items:center;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg);height:26px}
#srch-wrap input{border:none;background:transparent;padding:0 8px;font-size:12.5px;color:var(--txt);outline:none;width:170px}
#srch-wrap input::placeholder{color:var(--txt3)}
.srch-ico{padding:0 6px;color:var(--txt3);font-size:13px}

/* BODY */
#body{display:flex;flex:1;overflow:hidden;min-height:0}

/* LEFT NAV */
#nav{width:228px;min-width:228px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;transition:width .2s,min-width .2s;flex-shrink:0}
#nav.col{width:40px;min-width:40px}
.nav-top{height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 8px 0 11px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.nav-top-lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);white-space:nowrap;transition:opacity .15s}
#nav.col .nav-top-lbl{opacity:0;pointer-events:none}
.nav-col-btn{width:22px;height:22px;border-radius:4px;background:transparent;border:none;cursor:pointer;color:var(--txt3);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:background .1s}
.nav-col-btn:hover{background:var(--bg3);color:var(--txt)}
#nav-icons{display:none;flex-direction:column;align-items:center;padding:8px 0;gap:2px}
#nav.col #nav-icons{display:flex}
#nav.col #nav-scroll{display:none}
.nic{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:15px;color:var(--txt2);transition:background .1s}
.nic:hover{background:var(--bg3)}
#nav-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
#nav-scroll::-webkit-scrollbar{width:4px}
#nav-scroll::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* TREE */
.ts-hdr{display:flex;align-items:center;height:36px;padding:0 8px 0 9px;cursor:pointer;user-select:none;font-size:14px;font-weight:600;color:var(--txt);transition:background .1s;white-space:nowrap;overflow:hidden}
.ts-hdr:hover{background:var(--bg3)}.ts-hdr.on{color:var(--nb)}
.ts-chv{width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--txt2);transition:transform .15s;flex-shrink:0}
.ts-hdr.on .ts-chv{transform:rotate(90deg);color:var(--nb)}
.ts-ico{font-size:14px;width:20px;text-align:center;flex-shrink:0;margin:0 7px 0 1px}
.ts-lbl{flex:1;overflow:hidden;text-overflow:ellipsis}
.ts-body{display:none}.ts-body.on{display:block}
.tg-hdr{display:flex;align-items:center;height:28px;padding:0 8px 0 26px;cursor:pointer;user-select:none;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--txt);transition:background .1s,color .1s;white-space:nowrap;overflow:hidden}
.tg-hdr:hover{background:var(--bg3);color:var(--nb)}.tg-hdr.on{color:var(--nb-l)}
.tg-chv{width:12px;height:12px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--txt2);transition:transform .13s;flex-shrink:0;margin-right:4px}
.tg-hdr.on .tg-chv{transform:rotate(90deg)}
.tg-body{display:none}.tg-body.on{display:block}
.ti{display:flex;align-items:center;height:32px;padding:0 8px 0 38px;font-size:13.5px;color:var(--txt);cursor:pointer;border-left:2px solid transparent;transition:background .1s,color .1s,border-color .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti:hover{background:var(--nb-tint);color:var(--nb);border-left-color:var(--nb-tint2)}
.ti.on{background:var(--nb-tint);color:var(--nb);border-left-color:var(--nb);font-weight:600}
.tfi{display:flex;align-items:center;height:32px;padding:0 8px 0 30px;font-size:13.5px;color:var(--txt);cursor:pointer;border-left:2px solid transparent;transition:background .1s,color .1s,border-color .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tfi:hover{background:var(--nb-tint);color:var(--nb);border-left-color:var(--nb-tint2)}
.tfi.on{background:var(--nb-tint);color:var(--nb);border-left-color:var(--nb);font-weight:600}

/* MAIN PANEL */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* SLIM TAB BAR — just shows open items, no content switching */
#tab-bar{display:flex;align-items:stretch;background:var(--bg3);border-bottom:1px solid var(--bdr);height:34px;overflow-x:auto;overflow-y:hidden;flex-shrink:0}
#tab-bar::-webkit-scrollbar{height:0}
.stab{display:flex;align-items:center;gap:6px;padding:0 10px;font-size:12px;color:var(--txt2);white-space:nowrap;border-right:1px solid var(--bdr);border-bottom:2px solid transparent;background:var(--bg3);user-select:none;min-width:100px;max-width:180px;flex-shrink:0}
.stab.on{background:var(--bg);color:var(--txt);border-bottom-color:var(--nb);font-weight:500}
.stab-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.stab-x{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--txt3);flex-shrink:0;cursor:pointer;transition:background .1s}
.stab-x:hover{background:var(--bdr2);color:var(--txt)}

/* TILE GRID — the main content area */
#tile-grid{flex:1;display:grid;overflow:hidden;gap:1px;background:var(--bdr)}
/* 0 open → single cell showing home */
#tile-grid.c0{grid-template-columns:1fr}
/* 1 open → full width */
#tile-grid.c1{grid-template-columns:1fr}
/* 2 open → 50/50 */
#tile-grid.c2{grid-template-columns:1fr 1fr}
/* 3+ open → thirds */
#tile-grid.c3{grid-template-columns:1fr 1fr 1fr}
#tile-grid.c4{grid-template-columns:1fr 1fr}

/* HOME TILE */
.home-tile{background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:14px}
.home-banner-sm{background:var(--nb);border-radius:var(--r-lg);padding:20px 30px;display:flex;align-items:center;gap:18px;max-width:560px;width:100%}
.home-logo-sm{background:var(--ny);color:var(--nb);font-weight:700;font-size:18px;padding:8px 14px;border-radius:var(--r);flex-shrink:0}
.home-ttl-sm{color:#fff;font-size:15px;font-weight:500;margin-bottom:3px}
.home-sub-sm{color:rgba(255,255,255,.6);font-size:12px;line-height:1.5}
.home-hint{color:var(--txt3);font-size:12.5px}

/* CALC TILE */
.calc-tile{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative}
.tile-hdr{height:32px;background:var(--nb);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0}
.tile-hdr-lbl{color:rgba(255,255,255,.9);font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tile-close{width:20px;height:20px;border-radius:4px;border:none;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:background .1s,color .1s;line-height:1}
.tile-close:hover{background:rgba(255,255,255,.25);color:#fff}
.tile-hdr-ext{color:rgba(255,255,255,.5);font-size:11px;text-decoration:none;padding:2px 6px;border-radius:3px;border:1px solid rgba(255,255,255,.2);transition:all .1s;white-space:nowrap}
.tile-hdr-ext:hover{background:rgba(255,255,255,.15);color:#fff}
.calc-tile iframe{flex:1;border:none;width:100%;height:100%}

/* placeholder tile (coming soon) */
.ph-tile{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.ph-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--txt3);font-size:13px}
.ph-icon{font-size:28px;opacity:.4}

/* STATUS BAR */
#sb{background:var(--nb);height:23px;display:flex;align-items:center;padding:0 11px;gap:14px;flex-shrink:0}
.sb-i{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.65);white-space:nowrap}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--ny);flex-shrink:0}
.sb-r{margin-left:auto}

/* SEARCH OVERLAY */
#srch-ol{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-start;justify-content:center;padding-top:70px}
#srch-ol.on{display:flex}
.srch-box{background:var(--bg);border:1px solid var(--bdr2);border-radius:var(--r-lg);width:540px;overflow:hidden}
.srch-in-row{display:flex;align-items:center;padding:9px 13px;border-bottom:1px solid var(--bdr);gap:8px}
.srch-in-row input{flex:1;border:none;background:transparent;font-size:15px;color:var(--txt);outline:none}
.srch-esc{font-size:11px;color:var(--txt3);white-space:nowrap}
.srch-res{padding:5px;max-height:340px;overflow-y:auto}
.srch-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:background .1s}
.srch-item:hover{background:var(--nb-tint)}
.srch-item:hover .srch-name{color:var(--nb)}
.srch-name{font-size:13px;color:var(--txt)}
.srch-path{font-size:11px;color:var(--txt3);margin-top:1px}
.srch-none{padding:16px;text-align:center;color:var(--txt3);font-size:13px}

/* ── MOBILE HAMBURGER (hidden on desktop) ── */
.hamb{display:none;width:34px;height:32px;border:1px solid var(--bdr);background:var(--bg);border-radius:var(--r);cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;margin-right:4px;color:var(--txt);padding:0}
.hamb svg{display:block}
.hamb:hover{background:var(--bg3)}
#nav-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}

/* ────────────────────────────────────────────
   RESPONSIVE — PHONE / NARROW TABLET (≤780px)
   ──────────────────────────────────────────── */
@media (max-width:780px){
  html,body{overflow:auto;font-size:14px}
  #app{height:auto;min-height:100vh}

  /* compact title bar — hide macOS dots + url label */
  #title-bar{height:38px;padding:0 10px;gap:8px}
  .tb-wins{display:none}
  .tb-title{font-size:12px;line-height:1.15;white-space:normal}
  .tb-url{display:none}
  .tb-logo{font-size:10px;padding:3px 7px}

  /* hide decorative menu bar on phones */
  #menu-bar{display:none}

  /* toolbar: horizontal scroll, larger tap targets */
  #toolbar{height:46px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;padding:0 6px}
  #toolbar::-webkit-scrollbar{height:0;display:none}
  .tb{height:34px;font-size:13px;padding:0 11px;flex-shrink:0}
  .tb-sep{display:none}
  .hamb{display:inline-flex}
  #srch-wrap{display:none}

  /* BODY: full-height minus chrome */
  #body{height:calc(100vh - 84px)}   /* title 38 + toolbar 46 */

  /* Nav becomes a fixed drawer, 85% of viewport */
  #nav{
    position:fixed;top:0;left:0;bottom:0;
    width:86vw;min-width:0;max-width:340px;
    height:100vh;z-index:100;
    transform:translateX(-105%);
    transition:transform .25s ease;
    box-shadow:2px 0 24px rgba(0,0,0,.35);
    background:var(--bg);
  }
  #nav.open{transform:translateX(0)}
  #nav.col{width:86vw;min-width:0;transform:translateX(-105%)}
  #nav-icons{display:none !important}
  .nav-top{height:44px}
  .nav-top-lbl{font-size:12px}
  .nav-col-btn{width:32px;height:32px;font-size:13px}
  #nav-scroll{display:block !important}

  /* bigger tap targets in nav */
  .ts-hdr{height:44px;font-size:15px}
  .ts-ico{font-size:16px}
  .tg-hdr{height:34px;font-size:11.5px;padding-left:30px}
  .ti,.tfi{height:40px;font-size:14.5px}

  /* backdrop for drawer */
  body.mob-nav-open #nav-backdrop{display:block}

  /* Main area: full width, stack tiles vertically */
  #main{width:100%;min-width:0}
  #tile-grid.c0,#tile-grid.c1,#tile-grid.c2,#tile-grid.c3,#tile-grid.c4{
    grid-template-columns:1fr !important;
    grid-auto-rows:minmax(calc(100vh - 160px),auto);
  }
  .calc-tile{min-height:calc(100vh - 170px)}

  /* Tab bar scrollable */
  #tab-bar{overflow-x:auto;scrollbar-width:none}
  #tab-bar::-webkit-scrollbar{display:none}
  .stab{min-width:140px;font-size:13px}

  /* Home tile: tighten */
  .home-tile{padding:24px 16px;gap:10px}
  .home-banner-sm{padding:14px 16px;gap:12px}
  .home-logo-sm{font-size:15px;padding:6px 11px}
  .home-ttl-sm{font-size:14px}
  .home-sub-sm{font-size:11.5px;line-height:1.4}

  /* Tile header: bigger close button */
  .tile-hdr{height:38px;padding:0 8px}
  .tile-hdr-lbl{font-size:13px}
  .tile-close{width:28px;height:28px;font-size:16px}
  .tile-hdr-ext{padding:4px 8px;font-size:11px}

  /* Status bar: simplify */
  #sb{height:28px;gap:10px;padding:0 10px;flex-wrap:nowrap;overflow:hidden}
  .sb-i{font-size:10.5px}
  .sb-r{display:none}
  .sb-i:nth-child(2){display:none}  /* hide BMS rev badge */

  /* Search overlay: full-width on mobile */
  #srch-ol{padding-top:30px;padding-left:10px;padding-right:10px}
  .srch-box{width:100%;max-width:560px}
  .srch-in-row input{font-size:16px}  /* avoid iOS zoom-on-focus */
}
</style>
</head>
<body>
<div id="srch-ol" onclick="srchClose(event)">
  <div class="srch-box">
    <div class="srch-in-row">
      <span style="font-size:15px;color:var(--txt3)">⌕</span>
      <input id="srch-inp" type="text" placeholder="Search library…" oninput="srchRun(this.value)">
      <span class="srch-esc">ESC to close</span>
    </div>
    <div class="srch-res" id="srch-res"></div>
  </div>
</div>

<div id="app">
  <div id="title-bar">
    <div class="tb-wins"><span class="tw-c"></span><span class="tw-m"></span><span class="tw-x"></span></div>
    <span class="tb-logo">N-SEA</span>
    <span class="tb-title">Diving Toolkit — Operational Library</span>
    <span class="tb-url">mark-lss.github.io</span>
  </div>
  <div id="menu-bar">
    <button class="mb">File</button>
    <button class="mb">View</button>
    <button class="mb">Tools</button>
    <button class="mb" onclick="srchOpen()">Search <span style="opacity:.4;font-size:10.5px;margin-left:3px">Ctrl+K</span></button>
    <button class="mb">Help</button>
  </div>
  <div id="toolbar">
    <button class="hamb" onclick="mobileNavToggle()" aria-label="Open navigation menu">
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="2" x2="17" y2="2"/><line x1="1" y1="7" x2="17" y2="7"/><line x1="1" y1="12" x2="17" y2="12"/></svg>
    </button>
    <button class="tb primary" onclick="closeAll()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5L1.5 7H3v7h4v-4h2v4h4V7h1.5L8 1.5z"/></svg>Home
    </button>
    <div class="tb-sep"></div>
    <button class="tb" onclick="openSec('calc')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Calculators
    </button>
    <button class="tb" onclick="openSec('emrg')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2l6 12H2L8 2z"/><line x1="8" y1="7" x2="8" y2="10"/><circle cx="8" cy="12.5" r=".6" fill="currentColor"/></svg>Emergency
    </button>
    <button class="tb" onclick="openSec('fam')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><polygon points="3,2 13,8 3,14"/></svg>Familiarisations
    </button>
    <button class="tb" onclick="openSec('docs')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="1" width="10" height="14" rx="1"/><line x1="6" y1="5" x2="10" y2="5"/><line x1="6" y1="8" x2="10" y2="8"/><line x1="6" y1="11" x2="8.5" y2="11"/></svg>Documents
    </button>
    <div class="tb-sep"></div>
    <button class="tb" onclick="srchOpen()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg>Search
    </button>
    <div id="srch-wrap"><span class="srch-ico">⌕</span><input type="text" placeholder="Quick search…" onfocus="srchOpen()" readonly></div>
  </div>

  <div id="body">
    <div id="nav-backdrop" onclick="mobileNavToggle()"></div>
    <div id="nav">
      <div class="nav-top">
        <span class="nav-top-lbl">Navigation</span>
        <button class="nav-col-btn" id="nav-col-btn" onclick="navToggle()" title="Collapse">◀</button>
      </div>
      <div id="nav-icons"></div>
      <div id="nav-scroll"><div id="nav-tree"></div></div>
    </div>
    <div id="main">
      <div id="tab-bar"></div>
      <div id="tile-grid" class="c0"></div>
    </div>
  </div>

  <div id="sb">
    <div class="sb-i"><span class="sb-dot"></span>Online</div>
    <div class="sb-i">BMS Rev 2.9</div>
    <div class="sb-i" id="sb-open">No items open</div>
    <div class="sb-i sb-r">N-Sea Group · Offshore Diving Operations</div>
  </div>
</div>

<script>
const DATA=[
  {id:'calc',label:'Calculators',icon:'⊞',groups:[
    {name:'Gas / Nitrox',items:[
      {id:'ead',name:'EAD + Table Depth',href:'/calculators/ead-and-table-depth-selection.html'},
      {id:'dalton',name:"Dalton's Law",href:'/calculators/daltons-law-calculations.html'},
      {id:'bailout',name:'Bailout Endurance',href:'/calculators/bailout-endurance.html'}
    ]},
    {name:'Oxygen Exposure',items:[
      {id:'otu',name:'OTU / ESOT',href:'/calculators/calculate-otu-and-esot.html'},
      {id:'otuconv',name:'OTU / ESOT Converter',href:'/calculators/otu-esot-converter.html'},
      {id:'esotrec',name:'ESOT Recovery',href:'/calculators/esot-recovery-calculator.html'},
      {id:'multiseg',name:'Multi-Segment OTU / ESOT',href:'/calculators/multi-segment-otu-esot.html'},
      {id:'vc',name:'Vital Capacity Reduction',href:'/calculators/vital-capacity-reduction-calculator.html'}
    ]}
  ]},
  {id:'emrg',label:'Emergency',icon:'⚠',groups:[
    {name:'Nitrox Emergencies',items:[
      {id:'nxfail',name:'Nitrox Failure — Switch to Air',href:'/emergency/nitrox-failure-switch-to-air.html'},
      {id:'boox',name:'Bailout Opened While on Nitrox',href:'/emergency/bailout-opened-while-on-nitrox.html'}
    ]},
    {name:'Response Planning',items:[
      {id:'erphbot',name:'ERP — HBOT / DDC Facility Reference',href:'/emergency/erp-hyperbaric-chambers.html'}
    ]}
  ]},
  {id:'fam',label:'Familiarisations',icon:'▶',groups:[
    {name:'Daughter Craft',items:[
      {id:'dc',name:'Daughter Craft Diving Operations',href:'/familiarisations/daughter-craft.html'}
    ]},
    {name:'Subsea Cutting',items:[
      {id:'broco2',name:'Broco BR-22 Plus — Ultra Thermic Cutting',href:'/familiarisations/broco-cutting.html'}
    ]},
    {name:'Technical Reference',items:[
      {id:'esotgd',name:'Oxygen Toxicity — DMAC 35 Guide',href:'/familiarisations/esot-dmac35-guide.html'},
      {id:'umbil',name:'Extended Air Diving Umbilical Operations',href:'/familiarisations/extended-umbilicals.html'}
    ]},
    {name:'SAT Operations',items:[
      {id:'satplan',name:'SAT Operations Planner',href:'/familiarisations/sat-bell-operations-planner.html'}
    ]}
  ]},
  {id:'docs',label:'Documents',icon:'◧',flat:[
    {id:'gd023uk',name:'UK Guidance Document',href:'/documents/uk/BMS-OP-0600-GD-023-UK_v2_5.docx'},
    {id:'te005uk',name:'UK Technical Examination',href:'/documents/uk/BMS-OP-0600-TE-005_UK_UPDATED.xlsx'},
    {id:'gd024nl',name:'NL Guidance Document',href:'/documents/nl/BMS-OP-0600-GD-024-NL_v0_3.docx'},
    {id:'te004nl',name:'NL Technical Examination',href:'/documents/nl/BMS-OP-0600-TE-004_NL_UPDATED.xlsx'},
    {id:'gd025de',name:'DE Guidance Document',href:'/documents/de/BMS-OP-0600-GD-025-DE_v1_2.docx'},
    {id:'te006de',name:'DE Technical Examination',href:'/documents/de/BMS-OP-0600-TE-006_DE_UPDATED.xlsx'},
    {id:'gd026uae',name:'UAE Guidance Document',href:'/documents/uae/BMS-OP-0600-GD-026-UAE_v1_2.docx'},
    {id:'te006uae',name:'UAE Technical Examination',href:'/documents/uae/BMS-OP-0600-TE-006_UAE_UPDATED.xlsx'},
    {id:'gdall',name:'Global Guidance Document',href:'/documents/all/BMS-OP-0600-GD-ALL_v1_0.docx'},
    {id:'hbotds',name:'HBOT / DDC Source Dataset',href:'/documents/NSea-HBOT-DDC-Source-Dataset.xlsx'}
  ]}
];

const IDX=[];
DATA.forEach(sec=>{
  (sec.groups||[]).forEach(g=>g.items.forEach(it=>IDX.push({...it,section:sec.label,group:g.name,secId:sec.id})));
  (sec.flat||[]).forEach(it=>IDX.push({...it,section:sec.label,group:'',secId:sec.id}));
});

/* open items list: [{id, name, href, ph}] */
let openItems=[];

/* ── NAV ── */
let navCol=false;
function navToggle(){navCol=!navCol;document.getElementById('nav').classList.toggle('col',navCol);document.getElementById('nav-col-btn').textContent=navCol?'▶':'◀'}

/* mobile drawer toggle — slides nav in/out on narrow screens */
function mobileNavToggle(){
  const nav=document.getElementById('nav');
  const open=nav.classList.toggle('open');
  document.body.classList.toggle('mob-nav-open',open);
}
function mobileNavClose(){
  document.getElementById('nav').classList.remove('open');
  document.body.classList.remove('mob-nav-open');
}

function buildTree(){
  const tree=document.getElementById('nav-tree'),icons=document.getElementById('nav-icons');
  tree.innerHTML=DATA.map((sec,si)=>{
    const bid='sb'+si;
    let inner=(sec.groups||[]).map((g,gi)=>{
      const gbid='gb'+si+'_'+gi;
      return`<div class="tg-hdr" onclick="togGrp('${gbid}',this)"><span class="tg-chv">▶</span>${g.name}</div><div class="tg-body" id="${gbid}">${g.items.map(it=>`<div class="ti" id="ti_${it.id}" onclick="pickItem('${it.id}')">${it.name}</div>`).join('')}</div>`;
    }).join('');
    inner+=(sec.flat||[]).map(it=>`<div class="tfi" id="ti_${it.id}" onclick="pickItem('${it.id}')">${it.name}</div>`).join('');
    return`<div class="ts-hdr" id="sh_${sec.id}" onclick="togSec('${bid}','${sec.id}',this)"><span class="ts-chv">▶</span><span class="ts-ico">${sec.icon}</span><span class="ts-lbl">${sec.label}</span></div><div class="ts-body" id="${bid}">${inner}</div>`;
  }).join('');
  icons.innerHTML=DATA.map(sec=>`<button class="nic" title="${sec.label}" onclick="openSec('${sec.id}')">${sec.icon}</button>`).join('');
}
function togSec(bid,secId,hdr){const b=document.getElementById(bid),o=b.classList.toggle('on');hdr.classList.toggle('on',o)}
function togGrp(bid,hdr){const b=document.getElementById(bid),o=b.classList.toggle('on');hdr.classList.toggle('on',o)}
function openSec(secId){const si=DATA.findIndex(s=>s.id===secId),bid='sb'+si,b=document.getElementById(bid),hdr=document.getElementById('sh_'+secId);if(b&&!b.classList.contains('on')){b.classList.add('on');hdr&&hdr.classList.add('on')}if(window.innerWidth<=780){const nav=document.getElementById('nav');nav.classList.add('open');document.body.classList.add('mob-nav-open')}}

/* ── OPEN / CLOSE ITEMS ── */
function pickItem(itemId){
  const item=IDX.find(x=>x.id===itemId);
  if(!item)return;
  const isMobile=window.innerWidth<=780;
  /* on mobile: one tile at a time — clear any other open */
  if(isMobile){
    openItems=[];
    document.querySelectorAll('.ti,.tfi').forEach(e=>e.classList.remove('on'));
    document.getElementById('ti_'+itemId)?.classList.add('on');
    mobileNavClose();
    openItems.push(item);
    render();
    return;
  }
  /* desktop: multi-tile behaviour */
  /* highlight nav */
  document.querySelectorAll('.ti,.tfi').forEach(e=>e.classList.remove('on'));
  document.getElementById('ti_'+itemId)?.classList.add('on');
  /* already open? just focus (scroll tab into view) */
  if(openItems.find(x=>x.id===itemId)){render();return}
  /* max 4 tiles */
  if(openItems.length>=4){openItems.shift()}
  openItems.push(item);
  render();
}

function closeTile(itemId){
  openItems=openItems.filter(x=>x.id!==itemId);
  /* clear nav highlight if no longer open */
  document.getElementById('ti_'+itemId)?.classList.remove('on');
  render();
}

function closeAll(){
  openItems=[];
  document.querySelectorAll('.ti,.tfi').forEach(e=>e.classList.remove('on'));
  render();
}

/* ── RENDER ── */
function render(){
  renderTabBar();
  renderTileGrid();
  renderStatus();
}

function renderTabBar(){
  const bar=document.getElementById('tab-bar');
  if(!openItems.length){bar.innerHTML='';return}
  bar.innerHTML=openItems.map(it=>
    `<div class="stab on"><span class="stab-lbl">${it.name}</span><span class="stab-x" onclick="closeTile('${it.id}')">✕</span></div>`
  ).join('');
}

function renderTileGrid(){
  const grid=document.getElementById('tile-grid');
  const n=openItems.length;
  /* set grid class */
  grid.className='c'+Math.min(n,4);
  if(n===0){
    grid.innerHTML=`<div class="home-tile">
      <div class="home-banner-sm">
        <div class="home-logo-sm">N-SEA</div>
        <div>
          <div class="home-ttl-sm">Diving Toolkit — Operations Library</div>
          <div class="home-sub-sm">Calculators · Emergency tools · Familiarisations · Documents</div>
        </div>
      </div>
      <div class="home-hint">Select an item from the navigation panel</div>
    </div>`;
    return;
  }
  grid.innerHTML=openItems.map(it=>tileHTML(it)).join('');
}

function tileHTML(it){
  if(it.ph){
    return`<div class="calc-tile">
      <div class="tile-hdr">
        <span class="tile-hdr-lbl">${it.name}</span>
        <button class="tile-close" onclick="closeTile('${it.id}')">✕</button>
      </div>
      <div class="ph-body">
        <div class="ph-icon">◈</div>
        <div>Coming soon</div>
        <div style="font-size:11px;color:var(--txt3)">This tool is not yet deployed</div>
      </div>
    </div>`;
  }
  return`<div class="calc-tile">
    <div class="tile-hdr">
      <span class="tile-hdr-lbl">${it.name}</span>
      <a class="tile-hdr-ext" href="${it.href}" target="_blank" rel="noopener">↗ Full screen</a>
      <button class="tile-close" onclick="closeTile('${it.id}')">✕</button>
    </div>
    <iframe src="${it.href}" title="${it.name}" loading="lazy"></iframe>
  </div>`;
}

function renderStatus(){
  const n=openItems.length;
  document.getElementById('sb-open').textContent=n===0?'No items open':n===1?openItems[0].name:n+' items open';
}

/* ── SEARCH ── */
function srchOpen(){document.getElementById('srch-ol').classList.add('on');setTimeout(()=>document.getElementById('srch-inp').focus(),40)}
function srchClose(e){if(e.target===document.getElementById('srch-ol')){document.getElementById('srch-ol').classList.remove('on');document.getElementById('srch-inp').value='';document.getElementById('srch-res').innerHTML=''}}
function srchRun(q){
  const res=document.getElementById('srch-res');q=q.trim().toLowerCase();
  if(!q){res.innerHTML='';return}
  const hits=IDX.filter(it=>it.name.toLowerCase().includes(q)||(it.section&&it.section.toLowerCase().includes(q))||(it.group&&it.group.toLowerCase().includes(q)));
  if(!hits.length){res.innerHTML='<div class="srch-none">No results</div>';return}
  res.innerHTML=hits.map(it=>`<div class="srch-item" onclick="srchPick('${it.id}')"><div><div class="srch-name">${it.name}</div><div class="srch-path">${it.section}${it.group?' › '+it.group:''}</div></div></div>`).join('');
}
function srchPick(id){document.getElementById('srch-ol').classList.remove('on');document.getElementById('srch-inp').value='';document.getElementById('srch-res').innerHTML='';const item=IDX.find(x=>x.id===id);if(item){openSec(item.secId);pickItem(id)}}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();srchOpen()}if(e.key==='Escape'){document.getElementById('srch-ol').classList.remove('on');mobileNavClose()}});

buildTree();
render();
</script>
</body>
</html>
